<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bộ đếm đơn giản</title>
    <style>
        #counter { font-size: 80px; font-weight: bold; margin-bottom: 20px; }
        button { padding: 10px 20px; font-size: 18px; cursor: pointer; margin: 5px; }
        .reset-btn { color: red; }
    </style>
</head>
<body>

    <div id="counter">0</div>
    
    <button id="increase">+1</button>
    <button id="decrease">-1</button>
    <button id="reset" class="reset-btn">Reset</button>

    <script>
        const counterDisplay = document.getElementById('counter');
        const incBtn = document.getElementById('increase');
        const decBtn = document.getElementById('decrease');
        const resetBtn = document.getElementById('reset');

        let count = Number(localStorage.getItem('counterValue')) || 0;
        
        const updateDisplay = (value) => {
            count = value;
            counterDisplay.innerText = count;
            localStorage.setItem('counterValue', count);
        };

        updateDisplay(count);

        incBtn.addEventListener('click', () => updateDisplay(count + 1));
        decBtn.addEventListener('click', () => updateDisplay(count - 1));
        resetBtn.addEventListener('click', () => updateDisplay(0));
    </script>
</body>
</html>
